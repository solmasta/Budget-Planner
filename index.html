%2520x%253D%2522316%2522%2520y%253D%2522156%2522%2520width%253D%252246%2522%2520height%253D%2522224%2522%2520rx%253D%252212%2522%2520fill%253D%2522%25235EEAD4%2522%252F%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D" />

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;
// ─── CONFIG ───────────────────────────────────────────────────────
// Your Cloudflare Worker that holds the Anthropic key and proxies to Claude.
const WORKER_URL = "https://mts-assistant.lukedorsett.workers.dev";
// Model the Worker should use. Switch to "claude-haiku-4-5" to cut cost ~3x.
const MODEL = "claude-sonnet-4-6";
// ──────────────────────────────────────────────────────────────────
// ── Categories (preset options, drawn from the spreadsheet's groups) ──
const INCOME_CATS = [
  { id: "wages",    label: "Wages & Tips" },
  { id: "interest", label: "Interest" },
  { id: "dividends",label: "Dividends" },
  { id: "gifts",    label: "Gifts received" },
  { id: "refunds",  label: "Refunds" },
  { id: "transfer", label: "Transfer from savings" },
  { id: "other-in", label: "Other income" },
];
const INCOME_COLOR = "#11875E";

const EXPENSE_CATS = [
  { id: "home",         label: "Home & Utilities", color: "#6366F1" },
  { id: "daily",        label: "Daily Living",     color: "#0EA5E9" },
  { id: "transport",    label: "Transportation",   color: "#EC4899" },
  { id: "health",       label: "Health",           color: "#14B8A6" },
  { id: "insurance",    label: "Insurance",        color: "#0D9488" },
  { id: "obligations",  label: "Loans & Debt",     color: "#F59E0B" },
  { id: "subscriptions",label: "Subscriptions",    color: "#A855F7" },
  { id: "children",     label: "Children",         color: "#F472B6" },
  { id: "education",    label: "Education",         color: "#8B5CF6" },
  { id: "entertainment",label: "Entertainment",    color: "#FB923C" },
  { id: "pets",         label: "Pets",             color: "#84CC16" },
  { id: "charity",      label: "Charity & Gifts",  color: "#EF4444" },
  { id: "vacation",     label: "Vacation",         color: "#06B6D4" },
  { id: "savings",      label: "Savings",          color: "#22C55E" },
  { id: "business",     label: "Business",         color: "#475569" },
  { id: "misc",         label: "Miscellaneous",    color: "#94A3B8" },
];
const expCat = (id) => EXPENSE_CATS.find((c) => c.id === id) || EXPENSE_CATS[EXPENSE_CATS.length - 1];
const inCat  = (id) => INCOME_CATS.find((c) => c.id === id) || INCOME_CATS[INCOME_CATS.length - 1];
const itemColor = (it) => (it.type === "income" ? INCOME_COLOR : expCat(it.category).color);

const FREQS = [
  { id: "once",      label: "One time" },
  { id: "weekly",    label: "Weekly" },
  { id: "biweekly",  label: "Every 2 weeks" },
  { id: "monthly",   label: "Monthly" },
  { id: "quarterly", label: "Quarterly" },
  { id: "yearly",    label: "Yearly" },
];
const freqLabel = (id) => (FREQS.find((f) => f.id === id) || FREQS[3]).label;

const STORAGE_KEY = "budget-planner-v2";
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MO_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));

// ── Date helpers (local, no timezone drift) ─────────────────────────
const parseISO = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); };
const toISO = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };

const money = (n) => {
  const v = Math.abs(n);
  return v.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: Number.isInteger(v) ? 0 : 2 });
};
const signed = (n) => (n < 0 ? "−" : "") + money(n);

// occurrences (day-of-month numbers) of an item within year/month(0-based)
function occurrences(item, y, m) {
  const a = parseISO(item.date);
  const ms = new Date(y, m, 1);
  const me = new Date(y, m + 1, 0);
  const res = [];
  if (item.freq === "once") {
    if (a.getFullYear() === y && a.getMonth() === m) res.push(a.getDate());
    return res;
  }
  if (item.freq === "weekly" || item.freq === "biweekly") {
    const step = item.freq === "weekly" ? 7 : 14;
    let d = new Date(a);
    if (d > me) return res;
    while (d < ms) d = addDays(d, step);
    while (d <= me) { res.push(d.getDate()); d = addDays(d, step); }
    return res;
  }
  const before = new Date(y, m, 1) < new Date(a.getFullYear(), a.getMonth(), 1);
  if (item.freq === "monthly") {
    if (!before) res.push(Math.min(a.getDate(), me.getDate()));
    return res;
  }
  if (item.freq === "quarterly") {
    const md = (y - a.getFullYear()) * 12 + (m - a.getMonth());
    if (md >= 0 && md % 3 === 0) res.push(Math.min(a.getDate(), me.getDate()));
    return res;
  }
  if (item.freq === "yearly") {
    if (y >= a.getFullYear() && m === a.getMonth()) res.push(Math.min(a.getDate(), me.getDate()));
    return res;
  }
  return res;
}

function monthTotals(items, y, m) {
  let inc = 0, exp = 0;
  for (const it of items) {
    const t = occurrences(it, y, m).length * it.amount;
    if (it.type === "income") inc += t; else exp += t;
  }
  return { inc, exp, net: inc - exp };
}

// running balance through end of year/month, starting from earliest item month
function runningBalance(items, startBalance, y, m) {
  if (items.length === 0) return startBalance;
  let sy = y, sm = m;
  for (const it of items) {
    const a = parseISO(it.date);
    if (a.getFullYear() < sy || (a.getFullYear() === sy && a.getMonth() < sm)) { sy = a.getFullYear(); sm = a.getMonth(); }
  }
  let bal = startBalance, cy = sy, cm = sm, guard = 0;
  while ((cy < y || (cy === y && cm <= m)) && guard < 240) {
    bal += monthTotals(items, cy, cm).net;
    cm++; if (cm > 11) { cm = 0; cy++; }
    guard++;
  }
  return bal;
}

// concrete dated events (with running balance) from anchor through toISO
function generateEvents(items, toISOstr) {
  const to = parseISO(toISOstr);
  const evs = [];
  for (const it of items) {
    const a = parseISO(it.date);
    if (a > to) continue;
    let cy = a.getFullYear(), cm = a.getMonth(), g = 0;
    while ((cy < to.getFullYear() || (cy === to.getFullYear() && cm <= to.getMonth())) && g < 240) {
      for (const day of occurrences(it, cy, cm)) {
        const d = new Date(cy, cm, day);
        if (d >= a && d <= to) evs.push({ iso: toISO(d), t: d.getTime(), item: it });
      }
      cm++; if (cm > 11) { cm = 0; cy++; } g++;
    }
  }
  evs.sort((x, y) => x.t - y.t || (x.item.type === y.item.type ? 0 : x.item.type === "income" ? -1 : 1));
  let bal = 0; // filled by caller via ledger()
  return evs;
}
function ledger(items, startBalance, toISOstr) {
  const evs = generateEvents(items, toISOstr);
  let bal = startBalance;
  return evs.map((e) => {
    bal += e.item.type === "income" ? e.item.amount : -e.item.amount;
    return { iso: e.iso, name: e.item.name, type: e.item.type, amount: e.item.amount, payee: e.item.payee || "", balance: bal };
  });
}

// ── Fonts / base styles ─────────────────────────────────────────────
function useTheme() {
  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap";
    document.head.appendChild(link);
    const style = document.createElement("style");
    style.textContent = `
      .bx-body{font-family:'Inter',system-ui,sans-serif}
      .bx-num{font-family:'Space Grotesk',system-ui,sans-serif;font-variant-numeric:tabular-nums}
      .bx-sheet{animation:bxUp .28s cubic-bezier(.22,1,.36,1)}
      @keyframes bxUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
      .bx-fade{animation:bxFade .2s ease both}
      @keyframes bxFade{from{opacity:0}to{opacity:1}}
      @media (prefers-reduced-motion:reduce){.bx-sheet,.bx-fade{animation:none}}
    `;
    document.head.appendChild(style);
  }, []);
}

// ── App ─────────────────────────────────────────────────────────────
function BudgetPlanner() {
  useTheme();
  const now = new Date();
  const [items, setItems] = useState([]);
  const [startBalance, setStartBalance] = useState(0);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const [selDay, setSelDay] = useState(now.getDate());
  const [editor, setEditor] = useState(null);
  const [advisor, setAdvisor] = useState(null); // {mode:'general'|'bill', bill?, onApplyDate?}
  const [showAll, setShowAll] = useState(false);
  const [editBal, setEditBal] = useState(false);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        setItems(Array.isArray(d.items) ? d.items : []);
        setStartBalance(Number(d.startBalance) || 0);
      }
    } catch (e) { /* fresh start */ }
    setLoading(false);
  }, []);

  function persist(nextItems, nextBal) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ items: nextItems, startBalance: nextBal }));
    } catch (e) { console.error("Could not save:", e); }
  }

  function upsert(it) {
    const next = items.some((x) => x.id === it.id)
      ? items.map((x) => (x.id === it.id ? it : x))
      : [...items, it];
    setItems(next); persist(next, startBalance); setEditor(null);
  }
  function remove(id) {
    const next = items.filter((x) => x.id !== id);
    setItems(next); persist(next, startBalance); setEditor(null);
  }
  function saveBalance(v) {
    const b = Math.round((parseFloat(v) || 0) * 100) / 100;
    setStartBalance(b); persist(items, b); setEditBal(false);
  }

  // derived for the viewed month
  const { y, m } = view;
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const firstDow = new Date(y, m, 1).getDay();
  const totals = useMemo(() => monthTotals(items, y, m), [items, y, m]);
  const endBalance = useMemo(() => runningBalance(items, startBalance, y, m), [items, startBalance, y, m]);

  // map day -> occurrences
  const dayMap = useMemo(() => {
    const map = {};
    for (const it of items) for (const day of occurrences(it, y, m)) {
      (map[day] = map[day] || []).push(it);
    }
    return map;
  }, [items, y, m]);

  const selItems = dayMap[selDay] || [];
  const selDate = new Date(y, m, selDay);

  function shiftMonth(delta) {
    let nm = m + delta, ny = y;
    if (nm < 0) { nm = 11; ny--; } if (nm > 11) { nm = 0; ny++; }
    setView({ y: ny, m: nm });
    const today = new Date();
    setSelDay(today.getFullYear() === ny && today.getMonth() === nm ? today.getDate() : 1);
    setEditBal(false);
  }

  const isToday = (day) => { const t = new Date(); return t.getFullYear() === y && t.getMonth() === m && t.getDate() === day; };

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div className="bx-body min-h-screen w-full" style={{ background: "#F2F4F7", color: "#16202B" }}>
      <div className="mx-auto w-full" style={{ maxWidth: 480, paddingBottom: 96 }}>
        {/* Header / month nav */}
        <header className="px-5 pt-7 pb-3 flex items-center justify-between">
          <div>
            <p className="bx-num text-[11px] font-semibold uppercase tracking-[0.18em]" style={{ color: "#8A95A3" }}>Budget planner</p>
            <h1 className="text-[24px] font-bold leading-tight mt-0.5" style={{ letterSpacing: "-0.02em" }}>
              {MONTHS[m]} {y}
            </h1>
          </div>
          <div className="flex gap-1.5">
            <NavBtn onClick={() => setAdvisor({ mode: "general" })} label="Budget advisor">
              <span style={{ fontSize: 15 }}>✨</span>
            </NavBtn>
            <NavBtn onClick={() => shiftMonth(-1)} label="Previous month">‹</NavBtn>
            <NavBtn onClick={() => shiftMonth(1)} label="Next month">›</NavBtn>
          </div>
        </header>

        {loading ? (
          <div className="px-5 py-20 text-center" style={{ color: "#8A95A3" }}>Loading…</div>
        ) : (
          <main className="px-4 space-y-4">
            {/* Hero: projected balance + month flows */}
            <section className="rounded-3xl p-6" style={{ background: "#13202E", color: "#fff", boxShadow: "0 18px 40px -20px rgba(19,32,46,.6)" }}>
              <div className="flex items-baseline justify-between">
                <p className="text-[12px] font-medium" style={{ color: "#8FA0B3" }}>Projected balance · end of {MO_SHORT[m]}</p>
                <button onClick={() => setEditBal((v) => !v)} className="text-[11px] font-semibold" style={{ color: "#5EEAD4" }}>
                  start {money(startBalance)}
                </button>
              </div>
              {editBal ? (
                <BalanceEditor value={startBalance} onSave={saveBalance} onCancel={() => setEditBal(false)} />
              ) : (
                <div className="bx-num font-bold mt-1" style={{ fontSize: 42, lineHeight: 1.05, color: endBalance >= 0 ? "#34D399" : "#FB7185", letterSpacing: "-0.03em" }}>
                  {signed(Math.round(endBalance))}
                </div>
              )}
              <div className="grid grid-cols-3 gap-2 mt-5">
                <Stat label="Income" value={money(Math.round(totals.inc))} color="#5EEAD4" />
                <Stat label="Expenses" value={money(Math.round(totals.exp))} color="#FCA5A5" />
                <Stat label="Net" value={signed(Math.round(totals.net))} color={totals.net >= 0 ? "#fff" : "#FB7185"} />
              </div>
            </section>

            {/* Calendar */}
            <section className="rounded-3xl bg-white p-4" style={{ boxShadow: "0 1px 2px rgba(16,24,40,.06)" }}>
              <div className="grid grid-cols-7 mb-1">
                {DOW.map((d) => (
                  <div key={d} className="text-center text-[11px] font-semibold py-1" style={{ color: "#A0AAB6" }}>{d[0]}</div>
                ))}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {cells.map((day, i) => {
                  if (day === null) return <div key={`e${i}`} />;
                  const its = dayMap[day] || [];
                  const sel = day === selDay;
                  const cols = [...new Set(its.map(itemColor))].slice(0, 3);
                  return (
                    <button key={day} onClick={() => setSelDay(day)}
                      className="relative rounded-xl flex flex-col items-center justify-start pt-1.5 active:scale-95"
                      style={{ height: 46, transition: "transform .1s", background: sel ? "#13202E" : "transparent", outline: isToday(day) && !sel ? "1.5px solid #CBD3DC" : "none", outlineOffset: -1.5 }}>
                      <span className="bx-num text-[13px] font-semibold" style={{ color: sel ? "#fff" : "#16202B" }}>{day}</span>
                      <span className="flex gap-0.5 mt-1 h-1.5">
                        {cols.map((c, k) => <span key={k} className="h-1.5 w-1.5 rounded-full" style={{ background: sel ? "#fff" : c }} />)}
                      </span>
                    </button>
                  );
                })}
              </div>
            </section>

            {/* Selected day */}

              ) : (
                <ul className="divide-y" style={{ borderColor: "#F0F2F5" }}>
                  {selItems.map((it) => (
                    <li key={it.id}>
                      <button onClick={() => setEditor({ item: it, date: it.date })} className="w-full flex items-center gap-3 py-2.5 text-left active:opacity-60">

              </button>
              {showAll && (
                <ul className="divide-y mt-3 bx-fade" style={{ borderColor: "#F0F2F5" }}>
                  {items.length === 0 && <li className="text-[13px] py-1" style={{ color: "#8A95A3" }}>No items yet.</li>}
                  {items.slice().sort((a, b) => a.date.localeCompare(b.date)).map((it) => (

                      <button onClick={() => setEditor({ item: it, date: it.date })} className="w-full flex items-center gap-3 py-2.5 text-left active:opacity-60">
                        <span className="inline-block h-2 w-2 rounded-full shrink-0" style={{ background: itemColor(it) }} />
                        <span className="flex-1 min-w-0">
                          <span className="block font-semibold text-[14px] truncate">{it.name}</span>
                          <span className="block text-[12px]" style={{ color: "#8A95A3" }}>
                            {freqLabel(it.freq)} · from {MO_SHORT[parseISO(it.date).getMonth()]} {parseISO(it.date).getDate()}
                          </span>
                        </span>
                        <span className="bx-num font-semibold text-[14px] shrink-0" style={{ color: it.type === "income" ? INCOME_COLOR : "#16202B" }}>
                          {it.type === "income" ? "+" : ""}{money(it.amount)}
                        </span>
                      </button>
                    </li>
                  ))}
                </ul>
              )}
            </section>
          </main>
        )}
      </div>

      {editor && (
        <Editor
          entry={editor}
          onClose={() => setEditor(null)}
          onSave={upsert}
          onDelete={remove}
          onAdvise={(bill, onApplyDate) => setAdvisor({ mode: "bill", bill, onApplyDate })}
        />
      )}
      {advisor && (
        <Advisor
          advisor={advisor}
          items={items}
          startBalance={startBalance}
          onClose={() => setAdvisor(null)}
        />
      )}
    </div>
  );
}

function Editor({ entry, onClose, onSave, onDelete, onAdvise }) {
  const item = entry.item;
  const [type, setType] = useState(item?.type || "expense");
  const [name, setName] = useState(item?.name || "");
  const [payee, setPayee] = useState(item?.payee || "");
  const [amount, setAmount] = useState(item?.amount != null ? String(item.amount) : "");
  const [date, setDate] = useState(item?.date || entry.date);
  const [fr, setFr] = useState(item?.freq || "monthly");
  const [grace, setGrace] = useState(item?.grace != null ? String(item.grace) : "");
  const [notes, setNotes] = useState(item?.notes || "");
  const cats = type === "income" ? INCOME_CATS : EXPENSE_CATS;
  const [category, setCategory] = useState(item?.category || (type === "income" ? "wages" : "home"));

  // keep category valid when type flips
  function switchType(t) {
    setType(t);
    setCategory(t === "income" ? "wages" : "home");
  }

  const amt = parseFloat(amount);
  const valid = name.trim() && amt > 0 && date;
  const inputStyle = { background: "#F2F4F7", border: "1px solid transparent" };
  const focus = (e) => (e.target.style.border = "1px solid #13202E");
  const blur = (e) => (e.target.style.border = "1px solid transparent");

  function build() {
    return {
      id: item?.id || uid(), type, name: name.trim(), payee: payee.trim(),
      amount: Math.round(amt * 100) / 100, date, freq: fr, category,
      grace: type === "expense" && grace !== "" ? Math.max(0, parseInt(grace, 10) || 0) : null,
      notes: notes.trim(),
    };
  }
  function save() { if (valid) onSave(build()); }

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center bx-fade" style={{ background: "rgba(19,32,46,.45)" }} onClick={onClose}>
      <div className="bx-sheet w-full bg-white rounded-t-3xl p-5" style={{ maxWidth: 480, maxHeight: "92vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
        <div className="mx-auto mb-4 h-1.5 w-10 rounded-full" style={{ background: "#E2E6EB" }} />

        {/* type toggle */}
        <div className="flex gap-2 mb-4 p-1 rounded-2xl" style={{ background: "#F2F4F7" }}>
          {["expense", "income"].map((t) => (
            <button key={t} onClick={() => switchType(t)}
              className="flex-1 rounded-xl py-2.5 text-[14px] font-semibold capitalize active:scale-[.98]"
              style={{ transition: "all .12s", background: type === t ? (t === "income" ? INCOME_COLOR : "#13202E") : "transparent", color: type === t ? "#fff" : "#6B7785" }}>
              {t === "expense" ? "Bill / expense" : "Income"}
            </button>
          ))}
        </div>

        <Field label="Name">
          <input value={name} onChange={(e) => setName(e.target.value)} onFocus={focus} onBlur={blur}
            placeholder={type === "income" ? "Paycheck, side gig…" : "Rent, electric, Netflix…"}
            className="w-full rounded-xl px-3.5 py-3 text-[15px] outline-none" style={inputStyle} />
        </Field>

        <Field label={type === "income" ? "Who it's from" : "Who it's for"}>
          <input value={payee} onChange={(e) => setPayee(e.target.value)} onFocus={focus} onBlur={blur}
            placeholder={type === "income" ? "Employer, client…" : "Landlord, ComEd, Visa…"}
            className="w-full rounded-xl px-3.5 py-3 text-[15px] outline-none" style={inputStyle} />
        </Field>

        <Field label="Amount">
          <input value={amount} onChange={(e) => setAmount(e.target.value.replace(/[^0-9.]/g, ""))} inputMode="decimal" placeholder="0"
            onFocus={focus} onBlur={blur} className="bx-num w-full rounded-xl px-3.5 py-3 text-[15px] outline-none" style={inputStyle} />
        </Field>

        <Field label="Date">
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} onFocus={focus} onBlur={blur}

        <Field label="Repeat">

            {FREQS.map((f) => (

        <Field label="Category">
          <div className="relative">

              {cats.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}

        {type === "expense" && (
          <Field label={<>Grace period <span style={{ fontWeight: 400, color: "#A0AAB6" }}>(days you can pay late without penalty — optional)</span></>}>
            <input value={grace} onChange={(e) => setGrace(e.target.value.replace(/[^0-9]/g, "").slice(0, 3))} inputMode="numeric"
              placeholder="e.g. 15" onFocus={focus} onBlur={blur}
              className="bx-num w-full rounded-xl px-3.5 py-3 text-[15px] outline-none" style={inputStyle} />
          </Field>
        )}

        <Field label={<>Notes <span style={{ fontWeight: 400, color: "#A0AAB6" }}>(optional)</span></>}>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} onFocus={focus} onBlur={blur} rows={2}
            placeholder={type === "income" ? "Account, splits…" : "Account #, autopay, confirmation…"}
            className="w-full rounded-xl px-3.5 py-3 text-[15px] outline-none resize-none" style={inputStyle} />
        </Field>

        {type === "expense" && valid && (
          <button onClick={() => onAdvise(build(), (iso) => setDate(iso))}
            className="w-full rounded-xl py-3 text-[14px] font-semibold active:scale-[.99] mb-2 flex items-center justify-center gap-2"
            style={{ transition: "all .12s", background: "#EEF2FF", color: "#4338CA" }}>
            <span>✨</span> Best day to pay this

        )}

        <button onClick={save} disabled={!valid}
          className="w-full rounded-xl py-3.5 text-[15px] font-semibold active:scale-[.99] mt-2"
          style={{ transition: "all .12s", background: valid ? "#13202E" : "#E2E6EB", color: valid ? "#fff" : "#A0AAB6" }}>
          {item ? "Save changes" : `Add ${type === "income" ? "income" : "expense"}`}
        </button>
        {item ? (
          <button onClick={() => onDelete(item.id)} className="w-full py-3 mt-1 text-[14px] font-semibold" style={{ color: "#C2410C" }}>Delete</button>
        ) : (
          <button onClick={onClose} className="w-full py-3 mt-1 text-[14px] font-medium" style={{ color: "#8A95A3" }}>Cancel</button>
        )}
      </div>
    </div>
  );
}

  );

// ── AI Advisor ──────────────────────────────────────────────────────
async function callClaude(system, userContent) {
  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1000,
      system,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  if (!res.ok) throw new Error("Request failed (" + res.status + ")");
  const data = await res.json();
  // Handle the common Worker response shapes (Anthropic passthrough, or {text}/{completion})
  if (data && Array.isArray(data.content)) return data.content.filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
  if (data && typeof data.text === "string") return data.text.trim();
  if (data && typeof data.completion === "string") return data.completion.trim();
  if (typeof data === "string") return data.trim();
  throw new Error("Unexpected response from Worker");
}

function nextDue(bill, from) {
  let cy = from.getFullYear(), cm = from.getMonth(), g = 0;
  while (g < 36) {
    for (const d of occurrences(bill, cy, cm)) {
      const dt = new Date(cy, cm, d);
      if (dt >= from) return dt;
    }
    cm++; if (cm > 11) { cm = 0; cy++; } g++;
  }
  return parseISO(bill.date);
}

function buildContext(items, startBalance) {
  const today = new Date();
  const horizon = toISO(addDays(today, 80));
  const led = ledger(items, startBalance, horizon);
  const fromISO = toISO(addDays(today, -3));
  const lines = led
    .filter((e) => e.iso >= fromISO)
    .map((e) => `${e.iso}  ${e.type === "income" ? "+" : "-"}${e.amount}  ${e.name}${e.payee ? ` (${e.payee})` : ""}  -> balance ${Math.round(e.balance)}`);
  return { todayISO: toISO(today), lines };
}

const fmtLong = (iso) => { const d = parseISO(iso); return `${DOW[d.getDay()]}, ${MO_SHORT[d.getMonth()]} ${d.getDate()}`; };

function RichText({ text }) {
  return (
    <div className="space-y-2">
      {text.split(/\n+/).map((line, i) => {
        const t = line.trim();
        if (!t) return null;
        if (/^[-•]\s/.test(t))
          return (
            <div key={i} className="flex gap-2 text-[14px] leading-relaxed">
              <span style={{ color: "#A0AAB6" }}>•</span>
              <span>{t.replace(/^[-•]\s/, "")}</span>
            </div>
          );
        return <p key={i} className="text-[14px] leading-relaxed">{t}</p>;
      })}
    </div>
  );
}

function Advisor({ advisor, items, startBalance, onClose }) {
  const isBill = advisor.mode === "bill";
  const bill = advisor.bill;
  const [loading, setLoading] = useState(isBill);
  const [error, setError] = useState("");
  const [result, setResult] = useState(null); // {recommendedDate, headline, reasoning, suggestions}
  const [applied, setApplied] = useState(false);
  const [q, setQ] = useState("");
  const [answer, setAnswer] = useState("");
  const [asking, setAsking] = useState(false);

  const SYS_BASE =
    "You are a practical, plain-spoken budgeting advisor embedded in a personal budgeting app. You reason about real dates and running cash balances. Be specific and reference the numbers you are given. Never invent figures. Keep advice realistic and concise.";

  useEffect(() => {
    if (!isBill) return;
    (async () => {
      try {
        const ctx = buildContext(items, startBalance);
        const due = nextDue(bill, new Date());
        const dueISO = toISO(due);
        const graceEnd = bill.grace != null ? toISO(addDays(due, bill.grace)) : null;
        const sys = SYS_BASE +
          " Respond ONLY with a JSON object, no markdown and no preamble, with exactly these keys: " +
          "recommendedDate (a date string YYYY-MM-DD, the single best day to pay), " +
          "headline (<= 8 words), reasoning (1-2 sentences citing balances or paydays), " +
          "suggestions (array of 2-3 short strings: other ways to make this bill easier — e.g. autopay timing, splitting it, lowering it, aligning the due date).";
        const user =
          `Today is ${ctx.todayISO}.\n\n` +
          `Projected cash flow (date, amount, item, running balance):\n${ctx.lines.join("\n")}\n\n` +
          `Bill to schedule:\n` +
          `- Name: ${bill.name}${bill.payee ? ` (paid to ${bill.payee})` : ""}\n` +
          `- Amount: ${bill.amount}\n` +
          `- Next due: ${dueISO} (repeats ${freqLabel(bill.freq).toLowerCase()})\n` +
          `- Grace period: ${bill.grace != null ? `${bill.grace} days (can pay through ${graceEnd} without penalty)` : "unknown — assume none unless typical for this bill type"}\n` +
          (bill.notes ? `- Notes: ${bill.notes}\n` : "") +
          `\nRecommend the single best day to pay this bill within the next 60 days. Payment is safe from the due date through the end of any grace period; paying later within grace can help if a paycheck lands in between. Prioritize keeping the running balance from going negative and paying just after income arrives. recommendedDate must be a real calendar date.`;
        const text = await callClaude(sys, user);
        const clean = text.replace(/```json|```/g, "").trim();
        setResult(JSON.parse(clean));
      } catch (e) {
        setError("Couldn't get advice right now. Check your connection and try again.");
      } finally {
        setLoading(false);
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  async function ask() {
    const question = q.trim();
    if (!question || asking) return;
    setAsking(true); setAnswer(""); setError("");
    try {
      const ctx = buildContext(items, startBalance);
      const sys = SYS_BASE + " Answer in plain text (short paragraphs or simple '- ' bullets). No markdown headers or bold.";
      const user =
        `Today is ${ctx.todayISO}.\n\n` +
        `Projected cash flow (date, amount, item, running balance):\n${ctx.lines.join("\n")}\n\n` +
        (isBill ? `The user is currently looking at this bill: ${bill.name}, ${bill.amount}, due around ${toISO(nextDue(bill, new Date()))}.\n\n` : "") +
        `Question: ${question}`;
      setAnswer(await callClaude(sys, user));
    } catch (e) {
      setError("Couldn't answer right now. Try again in a moment.");
    } finally {
      setAsking(false);
    }
  }

  const recValid = result?.recommendedDate && /^\d{4}-\d{2}-\d{2}$/.test(result.recommendedDate);

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center bx-fade" style={{ background: "rgba(19,32,46,.45)" }} onClick={onClose}>
      <div className="bx-sheet w-full bg-white rounded-t-3xl p-5" style={{ maxWidth: 480, maxHeight: "92vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
        <div className="mx-auto mb-4 h-1.5 w-10 rounded-full" style={{ background: "#E2E6EB" }} />

        <div className="flex items-center gap-2 mb-1">
          <span className="text-[18px]">✨</span>
          <h3 className="text-[19px] font-bold">{isBill ? "Best day to pay" : "Budget advisor"}</h3>
        </div>
        {isBill && (
          <p className="text-[13px] mb-4" style={{ color: "#8A95A3" }}>
            {bill.name} · {money(bill.amount)}{bill.grace != null ? ` · ${bill.grace}-day grace` : ""}
          </p>
        )}

        {isBill && (
          <div className="rounded-2xl p-4 mb-4" style={{ background: "#F6F7FB", border: "1px solid #ECEFF4" }}>
            {loading ? (
              <div className="flex items-center gap-2 text-[14px]" style={{ color: "#6B7785" }}>
                <Spinner /> Reading your cash flow…
              </div>
            ) : result ? (
              <div>
                {recValid && (
                  <>
                    <div className="text-[11px] font-semibold uppercase tracking-[0.12em]" style={{ color: "#8A95A3" }}>Pay on</div>
                    <div className="bx-num text-[22px] font-bold mt-0.5" style={{ color: "#4338CA", letterSpacing: "-0.01em" }}>
                      {fmtLong(result.recommendedDate)}
                    </div>
                  </>
                )}
                {result.headline && <div className="font-semibold text-[15px] mt-2">{result.headline}</div>}
                {result.reasoning && <p className="text-[14px] leading-relaxed mt-1" style={{ color: "#3C4654" }}>{result.reasoning}</p>}
                {Array.isArray(result.suggestions) && result.suggestions.length > 0 && (
                  <div className="mt-3 space-y-1.5">
                    {result.suggestions.map((s, i) => (
                      <div key={i} className="flex gap-2 text-[13px] leading-relaxed" style={{ color: "#3C4654" }}>
                        <span style={{ color: "#A0AAB6" }}>•</span><span>{s}</span>
                      </div>
                    ))}
                  </div>
                )}
                {recValid && advisor.onApplyDate && (
                  applied ? (
                    <div className="mt-3 text-[13px] font-semibold" style={{ color: "#11875E" }}>✓ Pay day set — save the bill to keep it.</div>
                  ) : (
                    <button onClick={() => { advisor.onApplyDate(result.recommendedDate); setApplied(true); }}
                      className="mt-3 w-full rounded-xl py-2.5 text-[14px] font-semibold active:scale-[.99]"
                      style={{ background: "#4338CA", color: "#fff" }}>
                      Set this as the pay day
                    </button>
                  )
                )}
              </div>
            ) : (
              <p className="text-[14px]" style={{ color: "#C2410C" }}>{error}</p>
            )}
          </div>
        )}

        {/* Ask anything */}
        <label className="block text-[12px] font-semibold mb-1.5" style={{ color: "#6B7785" }}>
          {isBill ? "Ask a follow-up" : "Ask about your budget"}
        </label>
        <div className="flex gap-2">
          <input value={q} onChange={(e) => setQ(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") ask(); }}
            placeholder={isBill ? "Can I split this in two?" : "Where can I free up cash?"}
            className="flex-1 rounded-xl px-3.5 py-3 text-[15px] outline-none"
            style={{ background: "#F2F4F7", border: "1px solid transparent" }}
            onFocus={(e) => (e.target.style.border = "1px solid #13202E")}
            onBlur={(e) => (e.target.style.border = "1px solid transparent")} />
          <button onClick={ask} disabled={!q.trim() || asking}
            className="rounded-xl px-4 text-[14px] font-semibold active:scale-95"
            style={{ background: q.trim() && !asking ? "#13202E" : "#E2E6EB", color: q.trim() && !asking ? "#fff" : "#A0AAB6" }}>
            {asking ? <Spinner light /> : "Ask"}
          </button>
        </div>

        {answer && (
          <div className="mt-4 rounded-2xl p-4 bx-fade" style={{ background: "#F6F7FB", border: "1px solid #ECEFF4" }}>
            <RichText text={answer} />
          </div>
        )}
        {error && !loading && !answer && <p className="mt-3 text-[13px]" style={{ color: "#C2410C" }}>{error}</p>}

        <p className="text-[11px] leading-relaxed mt-4" style={{ color: "#A0AAB6" }}>
          Suggestions are general guidance from AI, not financial advice. Check grace periods and fees with each biller before changing a payment date.
        </p>
        <button onClick={onClose} className="w-full py-3 mt-2 text-[14px] font-medium" style={{ color: "#8A95A3" }}>Close</button>
      </div>
    </div>
  );
}

function Spinner({ light }) {
  return (
    <span className="inline-block h-4 w-4 rounded-full animate-spin"
      style={{ border: "2px solid " + (light ? "rgba(255,255,255,.4)" : "#CBD3DC"), borderTopColor: light ? "#fff" : "#13202E" }} />
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(BudgetPlanner));

</script>
</body>
</html>
